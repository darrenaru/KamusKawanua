<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kamus Kawanua</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/logo-only-white.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <div class="nav-right">
        <a href="login/login.html" class="login-btn">Login</a>
    </div>
</div>

<div class="container">

    <div class="brand-logo-wrap">
        <img
            src="assets/images/logo.svg"
            alt="Kamus Kawanua"
            class="brand-logo"
            id="brandLogo"
            draggable="false"
            oncontextmenu="return false;"
        />
    </div>

    <div class="language-title">
        Manado &bull; Indonesia
    </div>

    <div class="language-row">

            <div class="lang-box">
                <input type="text" id="inputLang" readonly>
            </div>

            <div class="swap-btn" onclick="swapLanguage()">
                <img src="assets/images/reverse-arrow.png" alt="swap">
            </div>

            <div class="lang-box">
                <input type="text" id="outputLang" readonly>
    </div>

</div>

</div>

    <div class="search-box">
        <input type="text" id="query" placeholder="Masukkan kata..." />
        <button onclick="search()" class="search-btn" id="searchBtn">
            <img src="assets/images/search.png" alt="search">
        </button>
    </div>

    <div id="searchLoading" class="search-loading" style="display:none" aria-live="polite" aria-busy="true">
        <div class="spinner" aria-hidden="true"></div>
        <div class="search-loading-text">Mencari…</div>
    </div>

    <div id="results"></div>

</div>

<script src="script.js"></script>
</body>
</html>
