<!DOCTYPE html>
<html>
<head>
    <title>Kamus Kawanua</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <div class="nav-right">
        <!-- FIX PATH -->
        <a href="login/login.html" class="login-btn">Login</a>
    </div>
</div>

<div class="container">

    <h1>KAMUS KAWANUA</h1>

    <div class="language-title">
        Manado &bull; Indonesia &bull; Inggris
    </div>

    <div class="language-row">

        <div class="lang-box">
            <select id="inputLang" onchange="updateOutputOptions()">
                <option value="manado">Manado</option>
                <option value="indonesia">Indonesia</option>
                <option value="inggris">Inggris</option>
            </select>
        </div>

        <div class="arrow"></div>

        <div class="lang-box">
            <input type="text" id="outputLang" readonly>
        </div>

    </div>

    <div class="search-box">
        <input type="text" id="query" placeholder="Masukkan kata..." />
        <button onclick="search()" class="search-btn">
        <img src="assets/images/search.png" alt="search">
        </button>
    </div>

    <div id="results"></div>

</div>

<script src="script.js"></script>
</body>
</html>
