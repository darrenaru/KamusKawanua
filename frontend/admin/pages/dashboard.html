<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Home</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/logo-only-white.svg">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
  <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/sidebar.css">
</head>
<body>

<div class="layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <img src="../../assets/images/logo.png" alt="logo">
            </div>
            <ul>
                <li class="active"><a href="dashboard.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span>Dashboard</span></a></li>
                <li><a href="data-collection.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg></span><span>Data Collection</span></a></li>
                <li><a href="preprocessing.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg></span><span>Preprocessing</span></a></li>
                <li><a href="processing.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg></span><span>Processing</span></a></li>
                <li><a href="testing.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/></svg></span><span>Testing</span></a></li>
                <li><a href="evaluasi.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span><span>Model Evaluation</span></a></li>
            </ul>
        
            <div class="sidebar-profile">
                <div class="profile-img">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div class="profile-info">
                    <span class="profile-name" id="sidebar-username">Loading...</span>
                    <span class="profile-role">System Administrator</span>
                </div>
            </div>

            <div class="sidebar-logout">
                <button class="logout-btn" id="logoutBtn" type="button">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </button>
            </div>
            
            <script>
                document.addEventListener("DOMContentLoaded", function() {
                    const uname = sessionStorage.getItem("username") || "Admin User";
                    const el = document.getElementById("sidebar-username");
                    if(el) el.innerText = uname;

                    document.getElementById("logoutBtn").addEventListener("click", function() {
                        if(confirm("Are you sure you want to logout?")) {
                            sessionStorage.clear();
                            window.location.href = "../../login/login.html";
                        }
                    });
                });
            </script>
        </aside>


  <!-- MAIN -->
  <main class="main">

    <h1 class="title-with-icon" data-aos="fade-up" data-aos-delay="40">
                <span class="title-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </span>
                Dashboard
            </h1>
    <p class="page-subtitle" data-aos="fade-up" data-aos-delay="90">Choose one algorithm to continue to dataset preparation and model workflow.</p>

    <div class="algorithms-container" data-aos="fade-up" data-aos-delay="140">
      <div class="algo-category">
        <h3 class="algo-category-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="stroke: var(--accent);"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Transformer Models
        </h3>
        <div class="algorithms grid-3">
          <button class="algo-btn" data-algo="indobert">
            <div class="algo-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
            <div class="algo-info">
              <span class="algo-name">IndoBERT</span>
              <span class="algo-desc">Pre-trained on Indonesian datasets for high accuracy in local context.</span>
            </div>
          </button>
          <button class="algo-btn" data-algo="mbert">
            <div class="algo-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg></div>
            <div class="algo-info">
              <span class="algo-name">mBERT</span>
              <span class="algo-desc">Multilingual BERT supporting 104 languages including Indonesian.</span>
            </div>
          </button>
          <button class="algo-btn" data-algo="xlm-r">
            <div class="algo-icon"><svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>
            <div class="algo-info">
              <span class="algo-name">XLM-R</span>
              <span class="algo-desc">Cross-lingual Language Model tailored for scaling multilingual tasks.</span>
            </div>
          </button>
        </div>
      </div>

      <div class="algo-category">
        <h3 class="algo-category-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="stroke: var(--accent);"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"/><polyline points="14 2 14 8 20 8"/><path d="M2 15h10"/><path d="m9 18 3-3-3-3"/></svg>
          Classic Models
        </h3>
        <div class="algorithms grid-2">
          <button class="algo-btn" data-algo="word2vec">
            <div class="algo-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
            <div class="algo-info">
              <span class="algo-name">Word2Vec</span>
              <span class="algo-desc">Neural word embedding model capturing rich semantic relationships.</span>
            </div>
          </button>
          <button class="algo-btn" data-algo="glove">
            <div class="algo-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></div>
            <div class="algo-info">
              <span class="algo-name">GloVe</span>
              <span class="algo-desc">Global Vectors for continuous distributed word representation.</span>
            </div>
          </button>
        </div>
      </div>
    </div>

    <div class="action-container" data-aos="fade-up" data-aos-delay="190">
      <button id="nextBtn" class="next-btn" disabled>
        Continue to Data Collection
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 8px; vertical-align: middle;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>
    </div>

  </main>

</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="../../animations.js"></script>
<script src="../js/xlm-registry-sync.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
