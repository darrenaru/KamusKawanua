<!DOCTYPE html>

</head>

      <li><a href="preprocessing.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M7 12h10"/><path d="M10 18h4"/></svg></span><span>Pre Processing</span></a></li>
      <li><a href="processing.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 4h12"/><path d="M6 12h12"/><path d="M6 20h12"/><circle cx="8" cy="4" r="1.5"/><circle cx="16" cy="12" r="1.5"/><circle cx="11" cy="20" r="1.5"/></svg></span><span>Processing</span></a></li>

      <li><a href="evaluasi.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span><span>Evaluasi Performa Model</span></a></li>

    <div class="algorithms">

      <button class="algo-btn" data-algo="mbert">MBERT</button>
      <button class="algo-btn" data-algo="indobert">INDOBERT</button>
      <button class="algo-btn" data-algo="xlmr">XLM-R</button>

      <button class="algo-btn" data-algo="word2vec">WORD2VEC</button>
      <button class="algo-btn" data-algo="glove">GLOVE</button>

    </div>

    <div id="selectedInfo" class="selected-info"></div>

    <button id="nextBtn" class="next-btn">
      Lanjut ke Data Collection

</div>

<script src="../js/dashboard.js"></script>
