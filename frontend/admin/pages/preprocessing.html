<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Preprocessing</title>
  <link rel="stylesheet" href="../css/preprocessing.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <img src="../../assets/images/logo.png" alt="logo">
    </div>

    <ul>
      <li><a href="dashboard.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 12l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></span><span>Home</span></a></li>
      <li><a href="data-collection.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="20" x2="9" y2="10"/></svg></span><span>Data Collection</span></a></li>
      <li class="active"><a href="preprocessing.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M7 12h10"/><path d="M10 18h4"/></svg></span><span>Preprocessing</span></a></li>
      <li><a href="processing.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 4h12"/><path d="M6 12h12"/><path d="M6 20h12"/><circle cx="8" cy="4" r="1.5"/><circle cx="16" cy="12" r="1.5"/><circle cx="11" cy="20" r="1.5"/></svg></span><span>Processing</span></a></li>
      <li><a href="testing.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 3h6"/><path d="M10 3v5l-4 7a4 4 0 0 0 3.5 6h5a4 4 0 0 0 3.5-6l-4-7V3"/></svg></span><span>Testing</span></a></li>
      <li><a href="evaluasi.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span><span>Model Performance Evaluation</span></a></li>
    </ul>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <h1 class="title-with-icon">
      <span class="title-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M7 12h10"/><path d="M10 18h4"/></svg>
      </span>
      Preprocessing
    </h1>

    <!-- TABLE WRAPPER -->
    <div class="table-wrapper">
      <table id="datasetTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Total</th>
            <th>Verb</th>
            <th>Noun</th>
            <th>Adjective</th>
            <th>Adverb</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>


  </div>

</div>

<!-- DETAIL MODAL -->
<div id="datasetCard" class="dataset-modal" style="display:none;">
  <div class="dataset-card" role="dialog" aria-modal="true" aria-labelledby="datasetName">
    <button type="button" id="closeDatasetModal" class="modal-close" aria-label="Close popup">×</button>
    <h3 id="datasetName"></h3>

    <div class="dataset-info">
      <div><span class="label">File</span><span class="value" id="fileName"></span></div>
      <div><span class="label">Data Count</span><span class="value" id="total"></span></div>
      <div><span class="label">Verb</span><span class="value" id="kerja"></span></div>
      <div><span class="label">Noun</span><span class="value" id="benda"></span></div>
      <div><span class="label">Adjective</span><span class="value" id="sifat"></span></div>
      <div><span class="label">Adverb</span><span class="value" id="keterangan"></span></div>
      <div><span class="label">Uploader</span><span class="value" id="uploader"></span></div>
      <div><span class="label">Date</span><span class="value" id="date"></span></div>
    </div>

    <!-- BUTTON -->
    <div class="action-row">
      <button id="processBtn" disabled>Start Preprocessing</button>
      <button id="cancelProcessBtn" style="display:none;" disabled>Cancel Preprocessing</button>
    </div>
    <button id="continueBtn" style="display:none;">Continue to Processing</button>
    
    <div class="progress-container" id="progressContainer">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <p id="progressText" class="progress-text">Select a dataset, then click Start Preprocessing</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/preprocessing.js"></script>

</body>
</html>
