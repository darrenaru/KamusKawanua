<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Data Collection</title>
  <link rel="stylesheet" href="../css/data-collection.css?v=2">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      <img src="../../assets/images/logo.png" alt="logo">
    </div>

    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li class="active"><a href="data-collection.html">Data Collection</a></li>
      <li><a href="preprocessing.html">Preprocessing</a></li>
      <li><a href="processing.html">Processing</a></li>
      <li><a href="testing.html">Testing</a></li>
      <li><a href="evaluasi.html">Evaluasi</a></li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h1>Data Collection</h1>

    <!-- UPLOAD -->
    <div class="upload-box">

  <label class="upload-label">
    <div class="upload-icon">📂</div>
    <div class="upload-text">Klik untuk pilih file CSV</div>
    <div id="fileName" class="file-name">Belum ada file</div>
</label>

<!-- 🔥 PINDAHKAN KE SINI -->
<input 
    type="text" 
    id="datasetName" 
    placeholder="Nama dataset" 
    class="dataset-input"
/>

    

  <input type="file" id="fileInput" accept=".csv">

  <div class="buttons">
      <button type="button" id="cancelBtn" onclick="resetFile()">Batal</button>
      <button type="button" id="uploadBtn" onclick="uploadDataset()" disabled>Unggah</button>
  </div>
  <div class="progress-container" id="progressContainer" style="display:none;">
    <div class="progress-bar" id="progressBar"></div>
</div>
<p id="progressText" style="display:none;">Mengunggah...</p>

</div>

    <!-- SEARCH -->
    <div class="search-box">
      <input type="text" placeholder="Cari dataset...">
    </div>

    <!-- DATA LIST -->
    <div id="datasetList" class="dataset-list"></div>

  </div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- JS -->
<script src="../js/data-collection.js?v=2"></script>

</body>
</html>
